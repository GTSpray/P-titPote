services:
  database:
    ports:
      - "${MYSQL_TCP_PORT}:3306"
  dbtest:
    image: mysql:8
    container_name: dbtest
    environment:
      MYSQL_DATABASE: "ptitpotetest"
      MYSQL_USER: "ptitpotetest"
      MYSQL_PASSWORD: "ptitpotetestpassword"
      MYSQL_ROOT_PASSWORD: "ptitpotetestrootpassword"
    ports:
      - "3307:3306"
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 20
  ptitpote:
    depends_on:
      database:
        condition: service_healthy
      dbtest:
        condition: service_healthy
    environment:
      LOG_LEVEL: "debug"
    command: npm run --silent dev
    volumes:
      - ${PWD}/dist:/app/dist
      - ${PWD}/node_modules:/app/node_modules
      - ${PWD}/package.json:/app/package.json
      - ${PWD}/package-lock.json:/app/package-lock.json
      - ${PWD}/logs:/app/logs
      - ${PWD}/global.d.ts:/app/global.d.ts
      - ${PWD}/tsconfig.json:/app/tsconfig.json
      - ${PWD}/vitest.config.ts:/app/vitest.config.ts
      - ${PWD}/src:/app/src
      - ${PWD}/tests:/app/tests
      - ${PWD}/.prettierrc:/app/.prettierrc
      - ${PWD}/.prettierignore:/app/.prettierignore
