services:
  api:
    environment:
      NODE_ENV: development
      LOG_LEVEL: 'info'
      GITHUB_ACTIONS: 1
      GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}
    build:
      context: .
      dockerfile: docker/ptitpote/Dockerfile
      target: ptitpotebuilder
    volumes:
      - ${PWD}:/app/
  localtunnel:
    restart: no
    image: mariadb:12.0.2-noble
    command: 'ls'
